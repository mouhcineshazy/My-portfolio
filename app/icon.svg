<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- Background: deep indigo to near-black -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Ambient blob glow — mirrors the site's background system -->
  <ellipse cx="52" cy="62" rx="30" ry="18" fill="url(#mark)" opacity="0.18" filter="url(#glow)"/>

  <!-- Glassmorphism border — ultra-thin, low opacity -->
  <rect width="100" height="100" rx="22" fill="none" stroke="url(#mark)" stroke-width="1.5" opacity="0.22"/>

  <!-- MS monogram: gradient, tight tracking, bold -->
  <text
    x="50"
    y="67"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
    font-size="40"
    font-weight="700"
    fill="url(#mark)"
    text-anchor="middle"
    letter-spacing="-1.5"
  >MS</text>
</svg>
